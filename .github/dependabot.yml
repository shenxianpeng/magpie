#
# Every ecosystem update below uses a 7-day cooldown so a just-
# released version has a week to settle (retags, withdrawals,
# upstream incident reports) before Dependabot proposes bumping to
# it. This mirrors the same window applied locally via
# `[tool.uv] exclude-newer = "7 days"` in the root pyproject.toml
# and `exclude-newer-span = "P7D"` baked into every tool's uv.lock.
#
# `uv` ecosystems use the full cooldown form (default-days plus the
# four semver-* buckets). `github-actions` and `pre-commit` only
# support `default-days` — adding the semver-* keys there causes
# dependabot to reject the whole config (see comment on the
# github-actions block).
---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # github-actions and pre-commit ecosystems do not support the
    # semver-{major,minor,patch}-days cooldown keys — dependabot
    # rejects the whole config block when they are present, which
    # is why this ecosystem produced zero PRs between adoption on
    # 2026-04-29 and the fix on 2026-05-25. Only `default-days` is
    # honoured here.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      pre-commit-hooks:
        patterns:
          - "*"

  # Root framework project — currently just `prek` as a dev dep,
  # tracked here so the version bound in pyproject.toml stays in
  # step with upstream releases.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      framework-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/privacy-llm/checker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      privacy-llm-checker-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/privacy-llm/redactor"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      privacy-llm-redactor-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/sandbox-lint"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      sandbox-lint-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/skill-evals"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      skill-evals-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/skill-and-tool-validator"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      skill-and-tool-validator-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/gmail/oauth-draft"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      oauth-draft-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/vulnogram/generate-cve-json"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      generate-cve-json-deps:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/tools/vulnogram/oauth-api"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      vulnogram-oauth-api-deps:
        patterns:
          - "*"
