#
# Implements mitigation M.29 from
# `docs/security/threat-model.md`: every change to the agent-host
# sandbox configuration in `.claude/settings.json` must be paired with
# a matching update to the canonical baseline at
# `tools/sandbox-lint/expected.json`, and the resulting configuration
# must satisfy the security invariants encoded in the linter.
---
name: sandbox-lint

on:  # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - ".claude/settings.json"
      - "tools/sandbox-lint/**"
      - ".github/workflows/sandbox-lint.yml"
  push:
    branches: [main]
    paths:
      - ".claude/settings.json"
      - "tools/sandbox-lint/**"
      - ".github/workflows/sandbox-lint.yml"

permissions: {}

jobs:
  sandbox-lint:
    name: lint .claude/settings.json against baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      # Sync the workspace so `sandbox-lint` (a workspace member's
      # `[project.scripts]` entry) ends up on the shared venv's PATH.
      # `--all-packages` is required — without it `uv sync` only
      # installs the root project's deps, and the root has
      # `package = false` so no member packages (and no member
      # script entry-points) get installed.
      - name: Sync workspace
        run: uv sync --all-packages --group dev
      # `sandbox-lint` is the workspace member's CLI entry point;
      # after sync it is available directly via `uv run` from the
      # repo root, which is what the linter expects so
      # `.claude/settings.json` and `tools/sandbox-lint/expected.json`
      # resolve relative to cwd.
      - name: Run sandbox-lint
        run: uv run sandbox-lint
