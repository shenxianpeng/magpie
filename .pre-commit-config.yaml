---
default_stages: [commit, push]
default_language_version:
  python: python3
  # Node 22 is the current active LTS line. markdownlint-cli2 ≥ v0.18
  # (and its string-width dependency from v6 onward) uses the regex
  # `/v` flag, which requires Node ≥ 20 to parse. The previous Node
  # 18.6.0 pin matched the framework's pre-PR-#18 tooling baseline
  # but is incompatible with the markdownlint-cli2 v0.22.1 rev
  # pinned below.
  node: 22.11.0
minimum_prek_version: '0.3.5'
repos:
  - repo: meta
    hooks:
      - id: identity
        name: Print input to the static check hooks for troubleshooting
      - id: check-hooks-apply
        name: Check if all hooks apply to the repository
  - repo: https://github.com/thlorenz/doctoc.git
    rev: v2.4.1
    hooks:
      - id: doctoc
        name: Add TOC for Markdown and RST files
        files: ^.+\.(md|rst)$
        # Skip agent-facing skill definitions: their YAML frontmatter must be
        # the first thing in the file, which is incompatible with doctoc
        # inserting a TOC block at the top. Also skip skill-evals fixture and
        # README files, and the spec-loop specs/prompts (YAML-frontmatter
        # specs and short single-purpose prompts, same rationale as skills)
        # — short docs that don't warrant a TOC.
        # Skip the PR template — GitHub pre-populates a new PR description
        # with the template verbatim, so a TOC block becomes per-PR noise the
        # contributor has to delete by hand.
        exclude: ^(\.claude/skills/.*|tools/vulnogram/generate-cve-json/SKILL\.md|tools/skill-evals/.*|tools/spec-loop/.*|\.github/PULL_REQUEST_TEMPLATE\.md)$
        args:
          - "--maxlevel"
          - "3"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        name: Check that merge conflicts are not being committed
      - id: detect-private-key
        name: Detect if private key is added to the repository
      - id: end-of-file-fixer
        name: Make sure that there is an empty line at the end
      - id: mixed-line-ending
        name: Detect if mixed line ending is used (\r vs. \r\n)
      - id: trailing-whitespace
        name: Remove trailing whitespace at end of line
  # markdownlint — catches structurally-bad markdown. Config in
  # `.markdownlint.json` enables only the rules that catch real bugs
  # (broken anchors via MD051, dangling link references via MD053);
  # style choices the existing docs already settled stay off.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        name: markdownlint
        files: \.md$
  # typos — fast spell-checker. Allowlist is `.typos.toml`.
  # Override the default args (which include `--write-changes`) so
  # the hook never silently rewrites files; CI surfaces typos as
  # errors instead.
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos
        name: typos
        args: [--force-exclude]
  # Local placeholder linter — catches hardcoded references like
  # `apache/airflow` or `Apache Airflow` that should be the
  # placeholder tokens `<upstream>` / `<PROJECT>` per
  # `AGENTS.md#placeholder-convention-used-in-skill-files`.
  - repo: local
    hooks:
      - id: check-placeholders
        name: check-placeholders
        language: system
        entry: tools/dev/check-placeholders.sh
        files: ^(\.claude/skills/.*|tools/.*)\.(md|sh|py|yaml|yml|toml)$
        pass_filenames: false
  # Project-local checks for the `generate-cve-json` Python project at
  # `tools/vulnogram/generate-cve-json/`. Each hook sets the working
  # directory via `uv run --directory` so ruff / mypy / pytest pick up
  # config from the project's pyproject.toml without explicit paths.
  # The `files:` pattern scopes each hook to changes inside the project
  # directory.
  - repo: local
    hooks:
      - id: generate-cve-json-ruff-check
        name: ruff check (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json ruff check
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-ruff-format
        name: ruff format (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json ruff format --check
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-mypy
        name: mypy (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json mypy
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: generate-cve-json-pytest
        name: pytest (generate-cve-json)
        language: system
        entry: uv run --directory tools/vulnogram/generate-cve-json pytest
        files: ^tools/vulnogram/generate-cve-json/(src|tests|pyproject\.toml)
        pass_filenames: false
  # Project-local checks for the `oauth-draft` Python project at
  # `tools/gmail/oauth-draft/`. Same shape as the generate-cve-json
  # hooks above — `uv run --directory` so each tool picks up config
  # from its own pyproject.toml; `files:` scopes by path.
  - repo: local
    hooks:
      - id: oauth-draft-ruff-check
        name: ruff check (oauth-draft)
        language: system
        entry: uv run --directory tools/gmail/oauth-draft ruff check
        files: ^tools/gmail/oauth-draft/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: oauth-draft-ruff-format
        name: ruff format (oauth-draft)
        language: system
        entry: uv run --directory tools/gmail/oauth-draft ruff format --check
        files: ^tools/gmail/oauth-draft/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: oauth-draft-mypy
        name: mypy (oauth-draft)
        language: system
        entry: uv run --directory tools/gmail/oauth-draft mypy
        files: ^tools/gmail/oauth-draft/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: oauth-draft-pytest
        name: pytest (oauth-draft)
        language: system
        entry: uv run --directory tools/gmail/oauth-draft pytest
        files: ^tools/gmail/oauth-draft/(src|tests|pyproject\.toml)
        pass_filenames: false

  # Project-local checks for the Vulnogram OAuth-API helpers at
  # `tools/vulnogram/oauth-api/`. Same shape as the gmail/oauth-draft
  # hooks above.
  - repo: local
    hooks:
      - id: vulnogram-oauth-api-ruff-check
        name: ruff check (vulnogram-oauth-api)
        language: system
        entry: uv run --directory tools/vulnogram/oauth-api ruff check
        files: ^tools/vulnogram/oauth-api/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: vulnogram-oauth-api-ruff-format
        name: ruff format (vulnogram-oauth-api)
        language: system
        entry: uv run --directory tools/vulnogram/oauth-api ruff format --check
        files: ^tools/vulnogram/oauth-api/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: vulnogram-oauth-api-mypy
        name: mypy (vulnogram-oauth-api)
        language: system
        entry: uv run --directory tools/vulnogram/oauth-api mypy
        files: ^tools/vulnogram/oauth-api/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: vulnogram-oauth-api-pytest
        name: pytest (vulnogram-oauth-api)
        language: system
        entry: uv run --directory tools/vulnogram/oauth-api pytest
        files: ^tools/vulnogram/oauth-api/(src|tests|pyproject\.toml)
        pass_filenames: false

  - repo: local
    hooks:
      - id: redactor-ruff-check
        name: ruff check (redactor)
        language: system
        entry: uv run --directory tools/privacy-llm/redactor ruff check
        files: ^tools/privacy-llm/redactor/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: redactor-ruff-format
        name: ruff format (redactor)
        language: system
        entry: uv run --directory tools/privacy-llm/redactor ruff format --check
        files: ^tools/privacy-llm/redactor/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: redactor-mypy
        name: mypy (redactor)
        language: system
        entry: uv run --directory tools/privacy-llm/redactor mypy
        files: ^tools/privacy-llm/redactor/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: redactor-pytest
        name: pytest (redactor)
        language: system
        entry: uv run --directory tools/privacy-llm/redactor pytest
        files: ^tools/privacy-llm/redactor/(src|tests|pyproject\.toml)
        pass_filenames: false

  - repo: local
    hooks:
      - id: checker-ruff-check
        name: ruff check (checker)
        language: system
        entry: uv run --directory tools/privacy-llm/checker ruff check
        files: ^tools/privacy-llm/checker/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: checker-ruff-format
        name: ruff format (checker)
        language: system
        entry: uv run --directory tools/privacy-llm/checker ruff format --check
        files: ^tools/privacy-llm/checker/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: checker-mypy
        name: mypy (checker)
        language: system
        entry: uv run --directory tools/privacy-llm/checker mypy
        files: ^tools/privacy-llm/checker/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: checker-pytest
        name: pytest (checker)
        language: system
        entry: uv run --directory tools/privacy-llm/checker pytest
        files: ^tools/privacy-llm/checker/(src|tests|pyproject\.toml)
        pass_filenames: false

  # Project-local checks for the sandbox-lint Python project at
  # `tools/sandbox-lint/`. Same shape as the other tool hooks.
  # The pytest hook also covers the lint of `.claude/settings.json`
  # against `tools/sandbox-lint/expected.json` because the project's
  # tests load both files at module scope.
  - repo: local
    hooks:
      - id: sandbox-lint-ruff-check
        name: ruff check (sandbox-lint)
        language: system
        entry: uv run --directory tools/sandbox-lint ruff check
        files: ^tools/sandbox-lint/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: sandbox-lint-ruff-format
        name: ruff format (sandbox-lint)
        language: system
        entry: uv run --directory tools/sandbox-lint ruff format --check
        files: ^tools/sandbox-lint/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: sandbox-lint-mypy
        name: mypy (sandbox-lint)
        language: system
        entry: uv run --directory tools/sandbox-lint mypy
        files: ^tools/sandbox-lint/(src|tests|pyproject\.toml)
        pass_filenames: false
      - id: sandbox-lint-pytest
        name: pytest (sandbox-lint)
        language: system
        entry: uv run --directory tools/sandbox-lint pytest
        files: ^(tools/sandbox-lint/(src|tests|pyproject\.toml|expected\.json)|\.claude/settings\.json)
        pass_filenames: false

  - repo: local
    hooks:
      - id: skill-and-tool-validator-ruff-check
        name: ruff check (skill-and-tool-validator)
        language: system
        entry: uv run --directory tools/skill-and-tool-validator ruff check
        files: ^tools/skill-and-tool-validator/(src|tests|pyproject\.toml)
        pass_filenames: false
